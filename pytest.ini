[pytest]
testpaths = tests
asyncio_mode = auto

# Unlike a pure-unit-test suite, several of these test modules (test_consumption_tracker.py,
# test_pricing.py, test_integration_control_cycle.py) use the `hass` fixture from
# pytest-homeassistant-custom-component to exercise real HA storage/service-call plumbing —
# so, unlike a suite that never touches `hass`, the plugin must stay enabled here.
